<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-music"></i>
        <span>GrooveBox</span>
      </div>
      <nav>
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-layer-group"></i> Library</a>
      </nav>
      <div class="sidebar-section">
        <p class="section-title">PLAYLISTS</p>
        <ul id="playlist-sidebar"></ul>
      </div>
      <!-- Local file upload -->
      <div class="upload-area">
        <label for="local-upload" class="upload-btn">
          <i class="fa-solid fa-upload"></i> Add Local Songs
        </label>
        <input type="file" id="local-upload" accept="audio/*" multiple hidden />
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="main-header">
        <h2>All Songs</h2>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="Search songs..." />
        </div>
      </div>

      <div class="song-grid" id="song-grid"></div>
    </main>

    <!-- Now Playing Bar -->
    <footer class="now-playing">
      <!-- Song Info -->
      <div class="np-info">
        <div class="np-cover" id="np-cover">
          <i class="fa-solid fa-music"></i>
        </div>
        <div class="np-meta">
          <span class="np-title" id="np-title">No song selected</span>
          <span class="np-artist" id="np-artist">—</span>
        </div>
        <button class="icon-btn" id="like-btn" title="Like"><i class="fa-regular fa-heart"></i></button>
      </div>

      <!-- Controls -->
      <div class="np-controls">
        <div class="control-btns">
          <button class="icon-btn" id="shuffle-btn" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
          <button class="icon-btn" id="prev-btn" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
          <button class="icon-btn play-main" id="play-btn" title="Play/Pause">
            <i class="fa-solid fa-play"></i>
          </button>
          <button class="icon-btn" id="next-btn" title="Next"><i class="fa-solid fa-forward-step"></i></button>
          <button class="icon-btn" id="repeat-btn" title="Repeat"><i class="fa-solid fa-repeat"></i></button>
        </div>
        <div class="progress-area">
          <span id="current-time">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-thumb" id="progress-thumb"></div>
          </div>
          <span id="total-time">0:00</span>
        </div>
      </div>

      <!-- Volume & Extra -->
      <div class="np-extra">
        <button class="icon-btn" id="queue-btn" title="Queue"><i class="fa-solid fa-list"></i></button>
        <i class="fa-solid fa-volume-high vol-icon"></i>
        <div class="volume-bar" id="volume-bar">
          <div class="volume-fill" id="volume-fill"></div>
          <div class="volume-thumb" id="volume-thumb"></div>
        </div>
        <button class="icon-btn" id="mute-btn" title="Mute"><i class="fa-solid fa-volume-high"></i></button>
      </div>
    </footer>

    <!-- Queue Panel -->
    <div class="queue-panel" id="queue-panel">
      <div class="queue-header">
        <h3>Queue</h3>
        <button class="icon-btn" id="close-queue"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <ul id="queue-list"></ul>
    </div>

  </div>

  <audio id="audio-player"></audio>
  <script type="module" src="app.js"></script>
</body>
</html>
